<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #485C11;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
        }

        .hidden {
            display: none;
        }

        .sidebar {
            width: 250px;
            background-color: #9cc97f;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-shadow: 4px 0px 15px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header h2 {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }

        .menu {
            list-style: none;
            padding: 0;
        }

        .menu li {
            margin-bottom: 20px;
        }

        .menu a {
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            font-weight: 500;
        }

        .menu a:hover {
            color: #FFD700;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
            width: 100%;
            max-width: 700px;
            margin-left: 250px;
            box-sizing: border-box;
        }

        .app-container {
            background-color: #485C11;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }

        .study-pop-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .study-pop-title-main {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 5px;
        }

        .card-info-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #FFFFFF;
        }

        .card-progress-text {
            font-size: 0.875rem;
        }

        .deck-title-text {
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            flex-grow: 1;
            margin: 0 10px;
        }

        .close-button {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            color: #FFFFFF;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background-color: #6B765A;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #FFFFFF;
            border-radius: 2px;
            transition: width 0.3s ease-in-out;
        }

        .flashcard-scene {
            width: 100%;
            height: 300px;
            max-height: 300px;
            perspective: 1000px;
            margin: 20px 0;
        }

        .flashcard-container {
            width: 100%;
            height: 100%;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s;
            cursor: pointer;
            background-color: #8E9C78;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .flashcard.is-flipped {
            transform: rotateX(-180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            box-sizing: border-box;
            border-radius: 12px;
            text-align: center;
            overflow: hidden;
        }

        .card-face-front {
            background-color: #8E9C78;
        }

        .card-face-back {
            background-color: #8E9C78;
            transform: rotateX(180deg);
            justify-content: center;
            padding: 20px;
        }

        .question-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .card-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #FFFFFF;
        }

        .flip-instruction-bar {
            width: 100%;
            background-color: rgba(72, 92, 17, 0.3);
            padding: 12px 0;
            text-align: center;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .card-subtext {
            font-size: 0.9rem;
            color: #FFFFFF;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 250px;
            margin: 20px auto;
        }

        .nav-button {
            background-color: transparent;
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.75rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .nav-button:hover {
            background-color: #FFFFFF;
            color: #485C11;
        }

        .nav-button:disabled {
            border-color: #6B765A;
            color: #6B765A;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
<div class="sidebar">
    <div class="sidebar-header">
        <h2>StudyPop</h2>
    </div>
    <ul class="menu">
        <li><a href="/login">Logout</a></li>
    </ul>
</div>

<div class="content">
    <div class="app-container">
        <div class="study-pop-header">
            <span class="study-pop-title-main">StudyPop</span>
            <div class="card-info-top-row">
                <span id="cardProgressText" class="card-progress-text">1/1</span>
                <span id="deckTitle" class="deck-title-text" th:text="${deckTitle}">Judul Deck</span>
                <span class="close-button" onclick="closeApp()">&#10005;</span>
            </div>
            <div class="progress-bar-container">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="flashcard-scene">
            <div class="flashcard-container" th:each="card, iterStat : ${flashcards}"
                 th:classappend="${iterStat.index != 0} ? ' hidden' : ''">
                <div class="flashcard" onclick="flipCard(this)">
                    <div class="card-face card-face-front">
                        <div class="question-area question">
                            <p class="card-text" th:text="${card.question}">Pertanyaan</p>
                        </div>
                        <div class="flip-instruction-bar">
                            <span class="card-subtext">Klik kartu untuk membalik</span>
                        </div>
                    </div>
                    <div class="card-face card-face-back answer">
                        <div class="question-area answer">
                            <p class="card-text" th:text="${card.answer}">Jawaban</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="navigation navigation-buttons">
            <button id="prevButton" class="nav-button">&larr;</button>
            <button id="nextButton" class="nav-button">&rarr;</button>
        </div>
    </div>
</div>

<script>
    const flashcardContainers = document.querySelectorAll('.flashcard-container');
    let currentCardIndex = 0;

    function showCard(index) {
        flashcardContainers.forEach((el, i) => {
            el.classList.toggle('hidden', i !== index);
            el.querySelector('.flashcard').classList.remove('is-flipped');
        });

        document.getElementById('cardProgressText').textContent = `${index + 1}/${flashcardContainers.length}`;
        const progressBarFill = document.getElementById('progressBarFill');
        const percent = ((index + 1) / flashcardContainers.length) * 100;
        progressBarFill.style.width = `${percent}%`;

        document.getElementById('prevButton').disabled = index === 0;
        document.getElementById('nextButton').disabled = index === flashcardContainers.length - 1;
    }

    function flipCard(cardElement) {
        cardElement.classList.toggle('is-flipped');
    }

    document.getElementById('nextButton').addEventListener('click', () => {
        if (currentCardIndex < flashcardContainers.length - 1) {
            currentCardIndex++;
            showCard(currentCardIndex);
        }
    });

    document.getElementById('prevButton').addEventListener('click', () => {
        if (currentCardIndex > 0) {
            currentCardIndex--;
            showCard(currentCardIndex);
        }
    });

    window.onload = () => {
        showCard(currentCardIndex);
    };
</script>
</body>

</html>
